[module/wallpaper]
type = custom/text

click-left = $HOME/.config/polybar/scripts/wallpaper-bar.sh clickleft
click-middle = $HOME/.config/polybar/scripts/wallpaper-bar.sh clickmiddle
click-right = $HOME/.config/polybar/scripts/wallpaper-bar.sh clickright 
scroll-up = $HOME/.config/polybar/scripts/wallpaper-bar.sh scrollup
scroll-down = $HOME/.config/polybar/scripts/wallpaper-bar.sh scrolldown
content = %{T6}%{T-}
content-background = ${colors.color2}
content-foreground = ${colors.color0}
content-padding = 1
